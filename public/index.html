<!DOCTYPE html>
<html>
<head>
  <title>Bulk STK Push Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Bulk STK Push Dashboard</h1>

  <textarea
    id="numbers"
    placeholder="Enter phone numbers separated by commas or new lines"
  ></textarea>

  <input type="number" id="amount" placeholder="Amount">

  <input type="text" id="reference" placeholder="Reference">

  <input type="text" id="description" placeholder="Description">

  <button onclick="sendBulkSTK()">
    Send STK Push
  </button>

  <div id="results"></div>

</div>

<script src="app.js"></script>
</body>
</html>
